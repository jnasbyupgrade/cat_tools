name: CI
on: [push, pull_request]
jobs:
  test:
    strategy:
      matrix:
        pg: [18, 17, 16, 15, 14, 13, 12, 11]
    name: 🐘 PostgreSQL ${{ matrix.pg }}
    runs-on: ubuntu-latest
    container: pgxn/pgxn-tools
    steps:
      - name: Start PostgreSQL ${{ matrix.pg }}
        run: pg-start ${{ matrix.pg }}
      - name: Check out the repo
        uses: actions/checkout@v4
      - name: Install rsync
        run: apt-get install -y rsync
      - name: Test on PostgreSQL ${{ matrix.pg }}
        run: make test PGUSER=postgres

  pg-upgrade-test:
    strategy:
      matrix:
        include:
          - old_pg: "11"
            new_pg: "12"
          - old_pg: "11"
            new_pg: "18"
          - old_pg: "12"
            new_pg: "13"
          - old_pg: "12"
            new_pg: "18"
    name: 🔄 pg_upgrade ${{ matrix.old_pg }} → ${{ matrix.new_pg }}
    runs-on: ubuntu-latest
    container: pgxn/pgxn-tools
    steps:
      - name: Start PostgreSQL ${{ matrix.old_pg }}
        run: pg-start ${{ matrix.old_pg }}
      - name: Check out the repo
        uses: actions/checkout@v4
      - name: Set expected extension version
        run: |
          echo "EXPECTED_VERSION=$(sed -n "s/^default_version = '\(.*\)'$/\1/p" cat_tools.control)" >> $GITHUB_ENV
      - name: Install rsync
        run: apt-get install -y rsync
      - name: Install cat_tools into old cluster
        run: make install PGUSER=postgres
      - name: Test cat_tools on old cluster
        run: make test PGUSER=postgres
      - name: Prepare upgrade test database
        run: |
          createdb -U postgres cat_tools_upgrade_test
          psql -U postgres -d cat_tools_upgrade_test -c "CREATE EXTENSION cat_tools"
      - name: Install PostgreSQL ${{ matrix.new_pg }}
        run: apt-get install -y postgresql-${{ matrix.new_pg }} postgresql-server-dev-${{ matrix.new_pg }}
      - name: Install cat_tools into new cluster
        run: make install PGUSER=postgres PG_CONFIG=/usr/lib/postgresql/${{ matrix.new_pg }}/bin/pg_config
      - name: Upgrade cluster to PostgreSQL ${{ matrix.new_pg }}
        run: pg_upgradecluster -v ${{ matrix.new_pg }} ${{ matrix.old_pg }} test
      - name: Verify extension version after upgrade
        run: |
          VERSION=$(psql -U postgres -d cat_tools_upgrade_test -tAc "SELECT extversion FROM pg_extension WHERE extname = 'cat_tools'")
          echo "Extension version: ${VERSION:-<not found>}"
          echo "$VERSION" | grep -qF "$EXPECTED_VERSION"
      - name: Run test suite on new cluster
        run: make test PGUSER=postgres

  extension-update-test:
    strategy:
      matrix:
        # PG11-12: 0.2.2 is the oldest install script that works on PG11+. These
        # are the key compatibility boundary versions and are tested for the
        # 0.2.2→0.3.0 update path. (PG10 is dropped; the 0.2.0/0.2.1 update
        # paths required PG10 and can no longer be tested.)
        pg: [11, 12]
    name: ⬆️ Extension update test on PostgreSQL ${{ matrix.pg }}
    runs-on: ubuntu-latest
    container: pgxn/pgxn-tools
    steps:
      - name: Start PostgreSQL ${{ matrix.pg }}
        run: pg-start ${{ matrix.pg }}
      - name: Check out the repo
        uses: actions/checkout@v4
      - name: Install rsync
        run: apt-get install -y rsync
      - name: Set expected extension version
        run: |
          echo "EXPECTED_VERSION=$(sed -n "s/^default_version = '\(.*\)'$/\1/p" cat_tools.control)" >> $GITHUB_ENV
      - name: Install cat_tools (all versions)
        run: make install PGUSER=postgres
      - name: Test update from 0.2.2 (0.2.2→current path)
        run: |
          createdb -U postgres cat_tools_from_022
          psql -U postgres -d cat_tools_from_022 -c "CREATE EXTENSION cat_tools VERSION '0.2.2'"
          psql -U postgres -d cat_tools_from_022 -c "ALTER EXTENSION cat_tools UPDATE"
          VERSION=$(psql -U postgres -d cat_tools_from_022 -tAc "SELECT extversion FROM pg_extension WHERE extname = 'cat_tools'")
          echo "Version after 0.2.2 update: ${VERSION:-<not found>}"
          echo "$VERSION" | grep -qF "$EXPECTED_VERSION"
      - name: Run test suite on updated extension
        run: make test PGUSER=postgres
