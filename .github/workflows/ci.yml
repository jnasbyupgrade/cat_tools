name: CI
on: [push, pull_request]
jobs:
  test:
    strategy:
      matrix:
        pg: [18, 17, 16, 15, 14, 13, 12, 11, 10]
    name: 🐘 PostgreSQL ${{ matrix.pg }}
    runs-on: ubuntu-latest
    container: pgxn/pgxn-tools
    steps:
      - name: Start PostgreSQL ${{ matrix.pg }}
        run: pg-start ${{ matrix.pg }}
      - name: Check out the repo
        uses: actions/checkout@v4
      - name: Install rsync
        run: apt-get install -y rsync
      - name: Test on PostgreSQL ${{ matrix.pg }}
        run: make test PGUSER=postgres
      - name: Run upgrade drift test
        # Run on all supported PG versions to protect against changes in
        # pg_dump output over time.
        #
        # cat_tools--0.2.2.sql installs cleanly on PG 10+, so the real
        # ALTER EXTENSION UPDATE path is available on every version here.
        # If a future oldest-supported predecessor cannot install on all
        # supported versions, the fallback is DROP EXTENSION + CREATE
        # EXTENSION as the "upgraded" path — that still exercises pg_dump
        # normalization and OID-ordering differences even without testing
        # the upgrade SQL itself (which extension-update-test covers).
        run: test/upgrade-drift/run-drift-test.sh

  pg-upgrade-test:
    strategy:
      matrix:
        include:
          - old_pg: "10"
            new_pg: "11"
          - old_pg: "10"
            new_pg: "18"
          - old_pg: "11"
            new_pg: "12"
          - old_pg: "11"
            new_pg: "18"
          - old_pg: "12"
            new_pg: "13"
          - old_pg: "12"
            new_pg: "18"
    name: 🔄 pg_upgrade ${{ matrix.old_pg }} → ${{ matrix.new_pg }}
    runs-on: ubuntu-latest
    container: pgxn/pgxn-tools
    steps:
      - name: Start PostgreSQL ${{ matrix.old_pg }}
        run: pg-start ${{ matrix.old_pg }}
      - name: Check out the repo
        uses: actions/checkout@v4
      - name: Set expected extension version
        run: |
          echo "EXPECTED_VERSION=$(sed -n "s/^default_version = '//;s/'$//p" cat_tools.control)" >> $GITHUB_ENV
      - name: Install rsync
        run: apt-get install -y rsync
      - name: Install cat_tools into old cluster
        run: make install PGUSER=postgres
      - name: Test cat_tools on old cluster
        run: make test PGUSER=postgres
      - name: Prepare upgrade test database
        run: |
          createdb -U postgres cat_tools_upgrade_test
          psql -U postgres -d cat_tools_upgrade_test -c "CREATE EXTENSION cat_tools"
      - name: Install PostgreSQL ${{ matrix.new_pg }}
        run: apt-get install -y postgresql-${{ matrix.new_pg }} postgresql-server-dev-${{ matrix.new_pg }}
      - name: Install cat_tools into new cluster
        run: make install PGUSER=postgres PG_CONFIG=/usr/lib/postgresql/${{ matrix.new_pg }}/bin/pg_config
      - name: Upgrade cluster to PostgreSQL ${{ matrix.new_pg }}
        run: pg_upgradecluster -v ${{ matrix.new_pg }} ${{ matrix.old_pg }} test
      - name: Verify extension version after upgrade
        run: |
          VERSION=$(psql -U postgres -d cat_tools_upgrade_test -tAc "SELECT extversion FROM pg_extension WHERE extname = 'cat_tools'")
          echo "Extension version: ${VERSION:-<not found>}"
          echo "$VERSION" | grep -qF "$EXPECTED_VERSION"
      - name: Run test suite on new cluster
        run: make test PGUSER=postgres

  old-ext-pg-upgrade-test:
    # Simulates the real-world scenario: a user on PG10 with cat_tools 0.2.0 who
    # pg_upgrades their cluster to PG11 or PG12, then runs ALTER EXTENSION UPDATE.
    # This is distinct from pg-upgrade-test (which installs the current version first)
    # and from extension-update-test (which stays on the same PG version).
    strategy:
      matrix:
        include:
          - old_pg: "10"
            new_pg: "11"
          - old_pg: "10"
            new_pg: "12"
    name: 🔄 cat_tools 0.2.0 + pg_upgrade ${{ matrix.old_pg }} → ${{ matrix.new_pg }} + UPDATE
    runs-on: ubuntu-latest
    container: pgxn/pgxn-tools
    steps:
      - name: Start PostgreSQL ${{ matrix.old_pg }}
        run: pg-start ${{ matrix.old_pg }}
      - name: Check out the repo
        uses: actions/checkout@v4
      - name: Set expected extension version
        run: |
          echo "EXPECTED_VERSION=$(sed -n "s/^default_version = '//;s/'$//p" cat_tools.control)" >> $GITHUB_ENV
      - name: Install rsync
        run: apt-get install -y rsync
      - name: Install cat_tools (all versions) into old cluster
        run: make install PGUSER=postgres
      - name: Install cat_tools 0.2.0 into test database
        run: |
          createdb -U postgres cat_tools_upgrade_test
          psql -U postgres -d cat_tools_upgrade_test -c "CREATE EXTENSION cat_tools VERSION '0.2.0'"
      - name: Install PostgreSQL ${{ matrix.new_pg }}
        run: apt-get install -y postgresql-${{ matrix.new_pg }} postgresql-server-dev-${{ matrix.new_pg }}
      - name: Install cat_tools scripts into new cluster
        run: make install PGUSER=postgres PG_CONFIG=/usr/lib/postgresql/${{ matrix.new_pg }}/bin/pg_config
      - name: Upgrade cluster to PostgreSQL ${{ matrix.new_pg }}
        run: pg_upgradecluster -v ${{ matrix.new_pg }} ${{ matrix.old_pg }} test
      - name: Verify cat_tools still at 0.2.0 after pg_upgrade
        run: |
          VERSION=$(psql -U postgres -d cat_tools_upgrade_test -tAc "SELECT extversion FROM pg_extension WHERE extname = 'cat_tools'")
          echo "Extension version after pg_upgrade: ${VERSION:-<not found>}"
          echo "$VERSION" | grep -q "0.2.0"
      - name: Update cat_tools from 0.2.0 to current
        run: |
          psql -U postgres -d cat_tools_upgrade_test -c "ALTER EXTENSION cat_tools UPDATE"
          VERSION=$(psql -U postgres -d cat_tools_upgrade_test -tAc "SELECT extversion FROM pg_extension WHERE extname = 'cat_tools'")
          echo "Extension version after update: ${VERSION:-<not found>}"
          echo "$VERSION" | grep -qF "$EXPECTED_VERSION"
      - name: Run test suite on new cluster
        run: make test PGUSER=postgres

  extension-update-test:
    strategy:
      matrix:
        # PG10: the pre-0.2.2 install scripts use unqualified SELECT * in views,
        # which fails on PG11+ due to attmissingval (anyarray) and oid visibility.
        # PG10 is the only version where the full chain (0.2.0/0.2.1 → 0.3.0) can
        # be tested with a fresh install.
        # PG11-12: 0.2.2 is the oldest compatible install script. These are the key
        # compatibility boundary versions and are tested for the 0.2.2→0.3.0 path.
        pg: [10, 11, 12]
    name: ⬆️ Extension update test on PostgreSQL ${{ matrix.pg }}
    runs-on: ubuntu-latest
    container: pgxn/pgxn-tools
    steps:
      - name: Start PostgreSQL ${{ matrix.pg }}
        run: pg-start ${{ matrix.pg }}
      - name: Check out the repo
        uses: actions/checkout@v4
      - name: Install rsync
        run: apt-get install -y rsync
      - name: Set expected extension version
        run: |
          echo "EXPECTED_VERSION=$(sed -n "s/^default_version = '//;s/'$//p" cat_tools.control)" >> $GITHUB_ENV
      - name: Install cat_tools (all versions)
        run: make install PGUSER=postgres
      - name: Test upgrade from 0.2.0 (PG10 only — 0.2.0 install script fails on PG11+)
        if: matrix.pg == 10
        run: |
          psql -U postgres -c "CREATE EXTENSION cat_tools VERSION '0.2.0'"
          psql -U postgres -c "ALTER EXTENSION cat_tools UPDATE"
          VERSION=$(psql -U postgres -tAc "SELECT extversion FROM pg_extension WHERE extname = 'cat_tools'")
          echo "Version after 0.2.0 upgrade: ${VERSION:-<not found>}"
          echo "$VERSION" | grep -qF "$EXPECTED_VERSION"
      - name: Test upgrade from 0.2.1 (PG10 only — 0.2.1 install script fails on PG11+)
        if: matrix.pg == 10
        run: |
          createdb -U postgres cat_tools_from_021
          psql -U postgres -d cat_tools_from_021 -c "CREATE EXTENSION cat_tools VERSION '0.2.1'"
          psql -U postgres -d cat_tools_from_021 -c "ALTER EXTENSION cat_tools UPDATE"
          VERSION=$(psql -U postgres -d cat_tools_from_021 -tAc "SELECT extversion FROM pg_extension WHERE extname = 'cat_tools'")
          echo "Version after 0.2.1 upgrade: ${VERSION:-<not found>}"
          echo "$VERSION" | grep -qF "$EXPECTED_VERSION"
      - name: Test upgrade from 0.2.2 (0.2.2→current path, all versions)
        run: |
          createdb -U postgres cat_tools_from_022
          psql -U postgres -d cat_tools_from_022 -c "CREATE EXTENSION cat_tools VERSION '0.2.2'"
          psql -U postgres -d cat_tools_from_022 -c "ALTER EXTENSION cat_tools UPDATE"
          VERSION=$(psql -U postgres -d cat_tools_from_022 -tAc "SELECT extversion FROM pg_extension WHERE extname = 'cat_tools'")
          echo "Version after 0.2.2 upgrade: ${VERSION:-<not found>}"
          echo "$VERSION" | grep -qF "$EXPECTED_VERSION"
      - name: Run test suite on updated extension
        run: make test PGUSER=postgres

